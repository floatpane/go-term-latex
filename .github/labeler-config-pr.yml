# Keyword regex labels for PRs only (no area/* — pr-paths.yml handles those).

"bug": '\b([Bb]ug(s)?|[Ff]ix(es)?)\b'
"enhancement": '\b([Ff]eat(s)?)\b'
"documentation": '\b([Dd]ocumentation|[Dd]ocs|[Rr]eadme)\b'
"question": '\b([Qq]uestion(s)?|[Hh]elp)\b'
"performance": '\b([Pp]erformance|[Oo]ptimiz(e|ation))\b'
"dependencies": '([Cc]hore\(deps\)|[Ff]ix\(deps\))'
"ci": '\b([Cc]i|[Bb]uild|[Ww]orkflow)\b'
"chore": '\b([Cc]hore|[Mm]aintenance|[Rr]efactor)\b'
"security": '\b([Ss]ecurity|[Ss]hell.?escape|[Vv]ulnerabilit(y|ies))\b'
"os/linux": '\b([Ll]inux)\b'
"os/macos": '\b([Mm]ac[Oo][Ss]?|[Dd]arwin)\b'
"os/windows": '\b([Ww]indows)\b'
"term/kitty": '\b([Kk]itty)\b'
"term/sixel": '\b([Ss]ixel)\b'
"backend/pdflatex": '\b([Pp][Dd][Ff][Ll]a[Tt]e[Xx])\b'
"backend/tectonic": '\b([Tt]ectonic)\b'
"backend/dvipng": '\b(dvipng)\b'
